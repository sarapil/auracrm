name: AuraCRM Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/auracrm/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/auracrm/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_ROOT_PASSWORD: frappe
          MYSQL_DATABASE: test_auracrm
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout frappe
        uses: actions/checkout@v4
        with:
          repository: frappe/frappe
          ref: version-16
          path: frappe-bench/apps/frappe

      - name: Checkout AuraCRM
        uses: actions/checkout@v4
        with:
          path: frappe-bench/apps/auracrm

      - name: Checkout CAPS
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/caps
          path: frappe-bench/apps/caps
          ref: main
        continue-on-error: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: yarn
          cache-dependency-path: frappe-bench/apps/frappe/package.json

      - name: Install bench
        run: pip install frappe-bench

      - name: Initialize bench
        working-directory: frappe-bench
        run: |
          bench init --skip-redis-config-generation --skip-assets --python python${{ matrix.python-version }} .
          bench set-config -g db_host 127.0.0.1
          bench set-config -g redis_cache redis://localhost:6379/0
          bench set-config -g redis_queue redis://localhost:6379/1
          bench set-config -g redis_socketio redis://localhost:6379/2

      - name: Install apps
        working-directory: frappe-bench
        run: |
          bench get-app auracrm ./apps/auracrm
          if [ -d "apps/caps" ]; then bench get-app caps ./apps/caps; fi
          bench new-site test.localhost --db-root-password frappe --admin-password admin --no-mariadb-socket
          bench --site test.localhost install-app auracrm
          if [ -d "apps/caps" ]; then bench --site test.localhost install-app caps; fi

      - name: Build assets
        working-directory: frappe-bench
        run: bench build --app auracrm

      - name: Run AuraCRM tests
        working-directory: frappe-bench
        run: |
          bench --site test.localhost run-tests --app auracrm --failfast 2>&1 | tee test-output.txt
          # Check exit code
          test ${PIPESTATUS[0]} -eq 0

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: frappe-bench/test-output.txt
          retention-days: 7

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install ruff

      - name: Run ruff check
        run: ruff check apps/auracrm/ --config pyproject.toml || true

      - name: Run ruff format check
        run: ruff format --check apps/auracrm/ --config pyproject.toml || true

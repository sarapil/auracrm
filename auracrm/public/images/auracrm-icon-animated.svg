<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <style>
    @keyframes ac-pulse { 0%,100% { opacity:0.7; r:6; } 50% { opacity:1; r:8; } }
    @keyframes ac-glow { 0%,100% { filter:drop-shadow(0 0 2px #6366F1); } 50% { filter:drop-shadow(0 0 8px #818cf8); } }
    .ac-tri { animation: ac-glow 3s ease-in-out infinite; }
    .ac-dot { animation: ac-pulse 2s ease-in-out infinite; }
  </style>
  <defs>
    <linearGradient id="ig" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#ig)"/>
  <path class="ac-tri" d="M32 14 L46 46 H18 Z" fill="none" stroke="#fff" stroke-width="2.5" stroke-linejoin="round"/>
  <circle class="ac-dot" cx="32" cy="30" r="6" fill="#fff" opacity="0.9"/>
  <path d="M24 42 h16" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
</svg>

<div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 600px; margin: 0 auto;">
  <div style="background: linear-gradient(135deg, #4338ca 0%, #6366f1 100%); padding: 24px; border-radius: 12px 12px 0 0;">
    <h2 style="color: #fff; margin: 0; font-size: 20px;">📋 New Lead Assigned</h2>
    <p style="color: #c7d2fe; margin: 8px 0 0; font-size: 14px;">AuraCRM — Lead Distribution</p>
  </div>
  <div style="background: #fff; padding: 24px; border: 1px solid #e5e7eb; border-top: none; border-radius: 0 0 12px 12px;">
    <p style="color: #374151; font-size: 14px; margin-bottom: 16px;">
      A new lead has been assigned to you via <strong>{{ distribution_method }}</strong> distribution.
    </p>
    <table style="width: 100%; border-collapse: collapse; margin-bottom: 16px;">
      <tr>
        <td style="padding: 8px 0; color: #6b7280; font-size: 13px;">Lead Name</td>
        <td style="padding: 8px 0; font-weight: 600; font-size: 14px;">
          <a href="{{ frappe.utils.get_url() }}/desk/lead/{{ lead_name }}" style="color: #6366f1; text-decoration: none;">
            {{ lead_title }}
          </a>
        </td>
      </tr>
      <tr>
        <td style="padding: 8px 0; color: #6b7280; font-size: 13px;">Source</td>
        <td style="padding: 8px 0; font-size: 14px;">{{ source or "—" }}</td>
      </tr>
      <tr>
        <td style="padding: 8px 0; color: #6b7280; font-size: 13px;">Score</td>
        <td style="padding: 8px 0; font-size: 14px;">
          <span style="background: {% if score >= 70 %}#dcfce7; color: #166534{% elif score >= 40 %}#fef9c3; color: #854d0e{% else %}#dbeafe; color: #1e40af{% endif %}; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600;">
            {{ score or 0 }} / 100
          </span>
        </td>
      </tr>
    </table>
    <div style="text-align: center; margin-top: 20px;">
      <a href="{{ frappe.utils.get_url() }}/desk/lead/{{ lead_name }}"
         style="background: #6366f1; color: #fff; padding: 10px 24px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 14px; display: inline-block;">
        View Lead →
      </a>
    </div>
  </div>
</div>
